project:
  type: default
  output-dir: _saida
  render:
    - relatorios

format:
  html:
    theme: litera
    css: relatorios/_common/relatorio_aula.css
    toc: true
    toc-depth: 3
    number-sections: true
    embed-resources: false
    smooth-scroll: true
    anchor-sections: true

execute:
  freeze: auto
  echo: false
  warning: false
  message: false

editor: visual
lang: pt-BR
